    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .player-container {
        max-width: 700px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 25px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .header {
        text-align: center;
        padding: 15px 0;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
      }
      .header h1 {
        font-size: 1.4rem;
        margin-bottom: 10px;
      }
      .search-box {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }
      .search-box input {
        flex: 1;
        padding: 10px 15px;
        border: none;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 1rem;
      }
      .search-box input::placeholder {
        color: #a0d2ff;
      }
      .search-box button {
        padding: 10px 20px;
        background: #e94560;
        border: none;
        border-radius: 25px;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
      }
      .search-box button:hover {
        background: #ff6b6b;
      }

      .now-playing {
        text-align: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 15px;
        margin-bottom: 20px;
      }
      .album-art {
        width: 160px;
        height: 160px;
        margin: 0 auto 15px;
        background: linear-gradient(45deg, #e94560, #0f3460);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        animation: rotate 20s linear infinite;
        animation-play-state: paused;
      }
      .album-art.playing {
        animation-play-state: running;
      }
      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .dhama-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin: 10px 0 5px;
      }
      .dhama-artist {
        color: #a0d2ff;
        font-size: 1rem;
      }
      .dhama-album {
        color: #888;
        font-size: 0.9rem;
      }

      .progress-container {
        margin: 20px 0;
        padding: 0 10px;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
        cursor: pointer;
        position: relative;
      }
      .progress {
        height: 100%;
        background: #e94560;
        border-radius: 3px;
        width: 0%;
        transition: width 0.1s;
      }
      .time-display {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #a0d2ff;
        margin-top: 5px;
      }

      .main-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 15px 0;
      }
      .btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }
      .btn-play {
        width: 65px;
        height: 65px;
        background: #e94560;
        font-size: 1.5rem;
      }
      .btn-play:hover {
        background: #ff6b6b;
        transform: scale(1.15);
      }

      .volume-control {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        justify-content: center;
      }
      .volume-control input {
        width: 100px;
        cursor: pointer;
      }

      .playlist-section {
        margin-top: 25px;
        border-top: 2px solid rgba(255, 255, 255, 0.2);
        padding-top: 20px;
      }
      .playlist-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .playlist-header h3 {
        font-size: 1.2rem;
      }
      .playlist-actions button {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.85rem;
        margin-left: 5px;
        transition: 0.3s;
      }
      .playlist-actions button:hover {
        background: #e94560;
      }

      .playlist {
        max-height: 350px;
        overflow-y: auto;
        border-radius: 10px;
      }
      .playlist::-webkit-scrollbar {
        width: 6px;
      }
      .playlist::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      .playlist::-webkit-scrollbar-thumb {
        background: #e94560;
        border-radius: 3px;
      }

        padding: 12px 15px;
        margin: 5px 0;

        border-radius: 10px;

        justify-content: space-between;

        color: #a0d2ff;
      }
      .dhama-item .dhama-album {

        color: #888;
      }
      .dhama-item .dhama-duration {

        font-size: 0.9rem;
        padding-left: 10px;
        white-space: nowrap;
      }

        text-align: center;
        padding: 30px;
        color: #a0d2ff;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #4caf50;
        color: white;
        padding: 12px 25px;
        border-radius: 30px;
        font-size: 0.95rem;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .toast.show {
        opacity: 1;
      }
      .toast.error {

      }

          height: 45px;

        .btn-play {
          width: 55px;
          height: 55px;
        }
        .playlist-header {
          flex-direction: column;
          align-items: flex-start;
        }

    <div class="player-container">
      <div class="header">
        <h1>🙏 ທັມມະບັນຍາຍອັດຕະໂນມັດ</h1>
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="🔍 ຄົ້ນຫາທັມມະ, ພຣະອາຈານ..."
          />
          <button onclick="searchDhamas()">ຄົ້ນຫາ</button>
        </div>
        <div
          style="
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.9rem;
            color: #a0d2ff;
          "
        >
          <span
            id="autoPlayToggle"
            style="
              cursor: pointer;
              padding: 5px 10px;
              border-radius: 15px;
              background: rgba(255, 255, 255, 0.1);
            "
            onclick="toggleAutoPlay()"
            >🔄 ເລ່ນອັດຕະໂນມັດ: ເປີດ</span
          >
          <span
            id="repeatToggle"
            style="
              cursor: pointer;
              padding: 5px 10px;
              border-radius: 15px;
              background: rgba(255, 255, 255, 0.1);
            "
            onclick="toggleRepeat()"
            >🔁 ຊ້ຳ: ເປີດ</span
          >
        </div>
      </div>

      <div class="now-playing">
        <div class="album-art" id="albumArt">🙏</div>
        <div class="dhama-title" id="currentTitle">ກຳລັງໂຫຼດທັມມະ...</div>
        <div class="dhama-artist" id="currentArtist">Lao Dhamma Collection</div>
        <div class="dhama-album" id="currentAlbum">Album</div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar">
          <div class="progress" id="progress"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <div class="main-controls">
        <button class="btn" id="prevBtn" title="ທັມມະກ່ອນ">⏮</button>
        <button class="btn btn-play" id="playBtn" title="ເລ່ນ/ຢຸດ">▶</button>
        <button class="btn" id="nextBtn" title="ທັມມະຖັດໄປ">⏭</button>
      </div>

      <div class="volume-control">
        <span>🔊</span>
        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.1"
          value="0.8"
        />
      </div>

      <div class="playlist-section">
        <div class="playlist-header">
          <h3>📋 ລາຍການທັມມະ <span id="dhamaCount">(0)</span></h3>
          <div class="playlist-actions">
            <button onclick="shuffleDhamas()">🔀 ສະຫຼັບ</button>
            <button onclick="copyPlaylist()">🔗 ຄັດລອກ</button>
          </div>
        </div>
        <div class="playlist" id="playlist">
          <div class="loading">ກຳລັງໂຫຼດລາຍຊື່ທັມມະ...</div>
        </div>
      </div>
    </div>

          id: 520,
        },
        {

          artist: "ອຈ. ໄຊຍະເດດ ວົງໂສພາ & ອຈ. ສີສຸກ ສະເຫລີມຄຸນ",
          src: "https://lao-online.com/all_files/dhamas/mp3/DHAMMA95FM02-133.mp3",
          album: "ທັມມະບັນຍາຍ",
          id: 521,
        },
        {
          title: "ໃນເມື່ອພຣະພຸທເຈົ້ານິພານໄປແລ້ວ ແລ້ວເພິ່ນສິຊ່ອຍເຮົາໄດ້ຈັ່ງໃດ",
          artist: "ອຈ. ໄຊຍະເດດ ວົງໂສພາ & ອຈ. ສີສຸກ ສະເຫລີມຄຸນ",
          src: "https://lao-online.com/all_files/dhamas/mp3/DHAMMA95FM02-163.mp3",
          album: "ທັມມະບັນຍາຍ",
          id: 522,
        },
      ];

      // 🎛️ ຕົວແປຫຼັກ
      const audio = document.getElementById("audioPlayer");
      const playBtn = document.getElementById("playBtn");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const progressBar = document.getElementById("progressBar");
      const progress = document.getElementById("progress");
      const currentTimeEl = document.getElementById("currentTime");
      const durationEl = document.getElementById("duration");
      const volumeSlider = document.getElementById("volumeSlider");
      const playlistEl = document.getElementById("playlist");
      const dhamaCountEl = document.getElementById("dhamaCount");
      const albumArt = document.getElementById("albumArt");
      const toast = document.getElementById("toast");
      const searchInput = document.getElementById("searchInput");

      let currentDhamaIndex = 0;
      let isPlaying = false;
      let isAutoPlay = true;
      let isRepeat = true;
      let isShuffled = false;
      let dhamas = [...laoDhamas];
      let originalDhamas = [...laoDhamas];

      // ⚙️ ເລີ່ມຕົ້ນ
      function init() {
        audio.volume = volumeSlider.value;
        renderPlaylist();
        loadDhama(currentDhamaIndex);
        setupEventListeners();
        showToast("ຍິນດີຕ້ອນຮັບ! 🇱🇦🙏", "success");
      }

      // 🔍 ຄົ້ນຫາທັມມະ
      function searchDhamas() {
        const query = searchInput.value.toLowerCase().trim();
        if (!query) {
          dhamas = [...originalDhamas];
        } else {
          dhamas = originalDhamas.filter(
            (dhama) =>
              dhama.title.toLowerCase().includes(query) ||
              dhama.artist.toLowerCase().includes(query) ||
              dhama.album.toLowerCase().includes(query),
          );
        }
        currentDhamaIndex = 0;
        renderPlaylist();
        if (dhamas.length > 0) {
          loadDhama(0);
          showToast(`ພົບ ${dhamas.length} ທັມມະ ✅`, "success");
        } else {
          showToast("ບໍ່ພົບທັມມະທີ່ຄົ້ນຫາ ❌", "error");
          playlistEl.innerHTML =
            '<div class="no-results">😔 ບໍ່ພົບທັມມະທີ່ຄົ້ນຫາ</div>';
        }
      }

      // 🎨 ສ້າງລາຍການທັມມະ
      function renderPlaylist() {
        playlistEl.innerHTML = "";
        dhamaCountEl.textContent = `(${dhamas.length})`;

        if (dhamas.length === 0) {
          playlistEl.innerHTML = '<div class="empty">ບໍ່ມີທັມມະໃນລາຍການ</div>';
          return;
        }

        dhamas.forEach((dhama, index) => {
          const item = document.createElement("div");
          item.className = `dhama-item ${index === currentDhamaIndex ? "active" : ""}`;
          item.innerHTML = `
                    <div class="dhama-info">
                        <div class="dhama-title">${index + 1}. ${dhama.title}</div>
                        <div class="dhama-artist">${dhama.artist}</div>
                        <div class="dhama-album">${dhama.album}${dhama.year ? " • " + dhama.year : ""}</div>
                    </div>
                    <span class="dhama-duration">🎧</span>
                `;
          item.onclick = () => {
            currentDhamaIndex = index;
            loadDhama(currentDhamaIndex);
            playDhama();
          };
          playlistEl.appendChild(item);
        });
      }

      // 🙏 ໂຫຼດທັມມະ
      function loadDhama(index) {
        if (!dhamas[index]) return;
        const dhama = dhamas[index];
        audio.src = dhama.src;
        document.getElementById("currentTitle").textContent = dhama.title;
        document.getElementById("currentArtist").textContent = dhama.artist;
        document.getElementById("currentAlbum").textContent =
          dhama.album || "Lao Dhamma";

        document.querySelectorAll(".dhama-item").forEach((item, i) => {
          item.classList.toggle("active", i === index);
        });
      }

      // ▶️ ເລ່ນທັມມະ
      function playDhama() {
        audio
          .play()
          .then(() => {
            isPlaying = true;
            playBtn.textContent = "⏸";
            albumArt.classList.add("playing");
          })
          .catch((err) => {
            console.log("Playback error:", err);
            showToast("⚠️ ບາງທັມມະອາດບໍ່ສາມາດເລ່ນໄດ້ໂດຍກົງ", "error");
          });
      }

      // ⏸️ ຢຸດທັມມະ
      function pauseDhama() {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = "▶";
        albumArt.classList.remove("playing");
      }

      // ⏭️ ທັມມະຖັດໄປ
      function nextDhama() {
        if (isShuffled) {
          currentDhamaIndex = Math.floor(Math.random() * dhamas.length);
        } else {
          currentDhamaIndex = (currentDhamaIndex + 1) % dhamas.length;
        }
        loadDhama(currentDhamaIndex);
        if (isPlaying || isAutoPlay) playDhama();
      }

      // ⏮️ ທັມມະກ່ອນ
      function prevDhama() {
        currentDhamaIndex =
          (currentDhamaIndex - 1 + dhamas.length) % dhamas.length;
        loadDhama(currentDhamaIndex);
        if (isPlaying || isAutoPlay) playDhama();
      }

      // 🔄 ອັບເດດ progress bar
      function updateProgress(e) {
        const { duration, currentTime } = e.srcElement;
        if (duration) {
          const percent = (currentTime / duration) * 100;
          progress.style.width = `${percent}%`;
          currentTimeEl.textContent = formatTime(currentTime);
          durationEl.textContent = formatTime(duration);
        }
      }

      // ⏱️ ປ່ຽນເວລາເປັນຮູບແບບ mm:ss
      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, "0")}`;
      }

      // 🎚️ ຕັ້ງຄ່າ progress ຈາກການຄລິກ
      function setProgress(e) {
        const width = this.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        if (duration) audio.currentTime = (clickX / width) * duration;
      }

      // 🔊 ປັບສຽງ
      function setVolume() {
        audio.volume = volumeSlider.value;
      }

      // 🔄 ສິ້ນສຸດທັມມະ
      function handleDhamaEnd() {
        if (isRepeat) {
          nextDhama();
        } else if (currentDhamaIndex < dhamas.length - 1) {
          nextDhama();
        } else {
          pauseDhama();
          if (isAutoPlay) {
            currentDhamaIndex = 0;
            loadDhama(0);
            playDhama();
          }
        }
      }

      // 🔀 ສັບລາຍການ
      function shuffleDhamas() {
        isShuffled = !isShuffled;
        if (isShuffled) {
          for (let i = dhamas.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [dhamas[i], dhamas[j]] = [dhamas[j], dhamas[i]];
          }
          currentDhamaIndex = 0;
          loadDhama(0);
        } else {
          dhamas = [...originalDhamas];
          loadDhama(currentDhamaIndex);
        }
        renderPlaylist();
        showToast(
          isShuffled ? "🔀 ສັບລາຍການແລ້ວ" : "📋 ກັບຄືນລຳດັບເດີມ",
          "success",
        );
      }

      // 🔗 ຄັດລອກລິ້ງທັມມະ
      function copyPlaylist() {
        const dhama = dhamas[currentDhamaIndex];
        if (dhama) {
          navigator.clipboard.writeText(dhama.src).then(() => {
            showToast("🔗 ຄັດລອກລິ້ງທັມມະແລ້ວ!", "success");
          });
          window.open(dhama.src, "_blank");
        }
      }

      // 🔄 ສະຫຼັບ AutoPlay
      function toggleAutoPlay() {
        isAutoPlay = !isAutoPlay;
        const el = document.getElementById("autoPlayToggle");
        el.textContent = `🔄 ເລ່ນອັດຕະໂນມັດ: ${isAutoPlay ? "ເປີດ" : "ປິດ"}`;
        el.style.background = isAutoPlay ? "#e94560" : "rgba(255,255,255,0.1)";
      }

      // 🔁 ສະຫຼັບ Repeat
      function toggleRepeat() {
        isRepeat = !isRepeat;
        const el = document.getElementById("repeatToggle");
        el.textContent = `🔁 ຊ້ຳ: ${isRepeat ? "ເປີດ" : "ປິດ"}`;
        el.style.background = isRepeat ? "#e94560" : "rgba(255,255,255,0.1)";
      }

      // 💬 ສະແດງ toast
      function showToast(message, type = "success") {
        toast.textContent = message;
        toast.className = `toast show ${type === "error" ? "error" : ""}`;
        setTimeout(() => toast.classList.remove("show"), 2500);
      }

      // 🔗 ຕິດ Event Listeners
      function setupEventListeners() {
        playBtn.onclick = () => (isPlaying ? pauseDhama() : playDhama());
        prevBtn.onclick = prevDhama;
        nextBtn.onclick = nextDhama;

        audio.addEventListener("timeupdate", updateProgress);
        audio.addEventListener("ended", handleDhamaEnd);
        audio.addEventListener("loadedmetadata", () => {
          durationEl.textContent = formatTime(audio.duration);
        });

        progressBar.onclick = setProgress;
        volumeSlider.oninput = setVolume;
        searchInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") searchDhamas();
        });

        // ຄີຍ໌ລັດ
        document.addEventListener("keydown", (e) => {
          if (e.code === "Space" && e.target.tagName !== "INPUT") {
            e.preventDefault();
            isPlaying ? pauseDhama() : playDhama();
          }
          if (e.code === "ArrowRight") nextDhama();
          if (e.code === "ArrowLeft") prevDhama();
        });
      }

      // 🚀 ເລີ່ມເຄື່ອງ!
      document.addEventListener("DOMContentLoaded", init);
    </script>
